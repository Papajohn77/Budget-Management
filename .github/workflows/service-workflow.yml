on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string

jobs:
  verify_job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: "temurin"
          cache: maven

      - name: Verify with Maven
        run: mvn -f services/pom.xml verify --projects ${{ inputs.service }} --also-make --batch-mode

  push_to_registry_job:
    if: github.event_name == 'push'

    needs: verify_job

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: "temurin"
          cache: maven

      - name: Build with Maven
        run: mvn -f services/pom.xml package -DskipTests --projects ${{ inputs.service }} --also-make --batch-mode

      - name: Login to Docker Hub
        uses: docker/login-action@f4ef78c080cd8ba55a85445d5b36e214a81df20a
        with:
          username: ${{ vars.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: ${{ vars.DOCKER_HUB_USER }}/${{ inputs.service }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build Docker image and push to Docker Hub
        uses: docker/build-push-action@3b5e8027fcad23fda98b2e3ac259d8d67585f671
        with:
          context: .
          build-args: |
            SERVICE=${{ inputs.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
