name: piggybank-service

on:
  push:
    branches: [main]
    paths:
      - services/piggybank-service/src/**
      - services/piggybank-service/pom.xml
      - services/pom.xml
      - Dockerfile
      - .github/workflows/piggybank-service.yml
      - .github/workflows/service-workflow.yml
  pull_request:
    branches: [main]
    paths:
      - services/piggybank-service/src/**
      - services/piggybank-service/pom.xml
      - services/pom.xml
      - Dockerfile
      - .github/workflows/piggybank-service.yml
      - .github/workflows/service-workflow.yml

jobs:
  run:
    uses: ./.github/workflows/service-workflow.yml
    with:
      service: piggybank-service
    secrets: inherit
